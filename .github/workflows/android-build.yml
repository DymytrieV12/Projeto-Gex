# ═══════════════════════════════════════════════════════════
# 🤖 Green Express — Android Build (APK)
# ═══════════════════════════════════════════════════════════
#
# Gera o APK release automaticamente a cada push na main.
# Não requer secrets — build não assinado (debug key).
# Para build assinado, adicionar keystore como secret.
# ═══════════════════════════════════════════════════════════

name: "🤖 Android Build"

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/ios-build.yml'

  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.32.0'
  JAVA_VERSION: '17'

jobs:
  build_android:
    name: "🔨 Build Android APK"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "📥 Checkout código"
        uses: actions/checkout@v4

      - name: "☕ Setup Java ${{ env.JAVA_VERSION }}"
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: "🐦 Instalar Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: "📦 Instalar dependências"
        run: flutter pub get

      - name: "🔍 Analisar código"
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: "🏗️ Build APK Release"
        run: flutter build apk --release --no-tree-shake-icons

      - name: "📤 Upload APK"
        uses: actions/upload-artifact@v4
        with:
          name: green-express-android
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
